<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <audio src="./game2.mp3" type="audio/mp3" controls></audio>

    <audio controls>
        <source src="./game2.mp3" type="audio/mp3">
        <p>音頻無法播放</p>
    </audio>
    <!-- 自動播放 -->
    <audio controls autoplay>
        <source src="./game2.mp3" type="audio/mp3">
        <p>音頻無法播放</p>
    </audio>
    <!-- 無限播 -->
    <audio controls loop>
        <source src="./game2.mp3" type="audio/mp3">
        <p>音頻無法播放</p>
    </audio>

    <video src="./game.mp4" type="video/quicktime" width="400" height="300" controls>
        <p>視頻無法播放</p>
    </video>

    <video src="./game.mp4" type="video/quicktime" width="400" height="300" controls autoplay>
        <p>視頻無法播放</p>
    </video>

    <video src="./game.mp4" type="video/quicktime" width="400" height="300" controls loop>
        <p>視頻無法播放</p>
    </video>

    <iframe src="./zs.pdf" frameborder="0"></iframe>

    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d29528.869012706138!2d114.22597119999999!3d22.3117312!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1szh-TW!2shk!4v1770171718396!5m2!1szh-TW!2shk" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/E5ZQIA8vwyc?si=5d4oMdUvXvXncE_r" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>

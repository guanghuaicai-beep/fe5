<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./shopping-list.css">
    <title>shopping list</title>
</head>
<body>
    <div class="container">
        <header>
            <img src="./shose1.jpg" width="30px" height="30px" alt="">
            <h1>Shopping List</h1>
        </header>
        <form action="" id="item-form">
            <div class="form-control">
                <input type="text" id="item-input" class="form-input" name="item" placeholder="Enter Item">
            </div>
            <div class="form-control">
                <button class="btn" type="submit">
                    <i class="fa-brands fa-docker"></i>Add Item
                </button>
            </div>
        </form>
        <div class="filter">
            <input type="text" class="form-input-filter" id="filter" placeholder="Filter Item">
            <ul id="item-list" class="item">
                <li>apple
                    <button class="remove-item btn-link text-red"><i class="fa-brands fa-docker"></i></button>
                </li>
                <li>xm
                    <button class="remove-item btn-link text-red"><i class="fa-brands fa-docker"></i></button>
                </li>
                <li>gl
                    <button class="remove-item btn-link text-red"><i class="fa-brands fa-docker"></i></button>
                </li>
            </ul>
            <button id="clear" class="btn-clear">Clear all</button>
        </div>
    </div>
    <a href="www.google.com">google</a>
    <script src="./shopping-list.js"></script>
</body>
</html>
